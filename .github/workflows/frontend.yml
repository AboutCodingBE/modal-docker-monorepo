name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'docker-compose.yml'
    branches: [main]
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --watch=false
        continue-on-error: true  # adapt to your test setup

      - name: Build
        run: cd frontend && npm run build -- --configuration=production

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/archive-app-frontend:latest
            ghcr.io/${{ github.repository_owner }}/archive-app-frontend:${{ github.sha }}
