name: Agent CI

on:
  push:
    paths:
      - 'agent/**'
    branches: [main]
  pull_request:
    paths:
      - 'agent/**'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          cd agent
          pyinstaller --onefile --name archive-agent --add-data "config.json:." agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-agent-${{ matrix.os }}
          path: agent/dist/archive-agent*
