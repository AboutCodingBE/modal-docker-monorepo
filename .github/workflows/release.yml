name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            zip_name: archive-app-linux.zip
            binary: agent/dist/archive-agent
          - os: macos-latest
            zip_name: archive-app-macos.zip
            binary: agent/dist/archive-agent
          - os: windows-latest
            zip_name: archive-app-windows.zip
            binary: agent/dist/archive-agent.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd agent
          pyinstaller --onefile --name archive-agent --add-data "config.json:." agent.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd agent
          pyinstaller --onefile --name archive-agent --add-data "config.json;." agent.py

      - name: Make binary executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.binary }}

      - name: Stage release files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir release-staging
          cp ${{ matrix.binary }} release-staging/archive-agent
          cp docker-compose.prod.yml release-staging/docker-compose.prod.yml
          cp README-RELEASE.md release-staging/README-RELEASE.md
          cp diagnostic.sh release-staging/diagnostic.sh
          chmod +x release-staging/diagnostic.sh
          echo '{"agent_port":9090,"frontend_url":"http://localhost:4200","compose_file":"docker-compose.prod.yml","log_file":"~/.archive-app/agent.log"}' > release-staging/config.json
          cd release-staging && zip ../${{ matrix.zip_name }} *

      - name: Stage release files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory release-staging
          Copy-Item ${{ matrix.binary }} release-staging/archive-agent.exe
          Copy-Item docker-compose.prod.yml release-staging/docker-compose.prod.yml
          Copy-Item README-RELEASE.md release-staging/README-RELEASE.md
          Copy-Item diagnostic.ps1 release-staging/diagnostic.ps1
          '{"agent_port":9090,"frontend_url":"http://localhost:4200","compose_file":"docker-compose.prod.yml","log_file":"~/.archive-app/agent.log"}' | Out-File -FilePath release-staging/config.json -Encoding utf8
          Compress-Archive -Path release-staging/* -DestinationPath ${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            archive-app-linux.zip
            archive-app-macos.zip
            archive-app-windows.zip
