services:
  frontend:
    image: ghcr.io/aboutcodingbe/archive-app-frontend:latest
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/aboutcodingbe/archive-app-backend:latest
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql+asyncpg://archiveuser:archivepass@db:5432/modaldb
      - TIKA_URL=http://tika:9998
      - AGENT_URL=http://host.docker.internal:9090
    depends_on:
      db:
        condition: service_healthy
      tika:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:latest-full
    ports:
      - "9998:9998"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=archiveuser
      - POSTGRES_PASSWORD=archivepass
      - POSTGRES_DB=modaldb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "archiveuser", "-d", "modaldb"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_started
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
          sleep 2;
        done &&
        echo 'Pulling default model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"gemma3:1b\"}' &&
        echo 'Default model ready.'
      "


volumes:
  pgdata:
  ollama_data:
